name: CourseForge AI — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  # ─── Type Check + Lint ──────────────────────────────────────────────────────
  quality:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm test

  # ─── Database Migration ─────────────────────────────────────────────────────
  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID
      - name: Apply migrations
        run: supabase db push --linked
      - name: Verify RLS on all tables
        run: |
          UNPROTECTED=$(supabase db query --linked \
            "SELECT count(*) FROM pg_tables WHERE schemaname='public' AND rowsecurity=false AND tablename NOT LIKE 'pg_%'" \
            --csv | tail -1 | tr -d ' ')
          if [ "$UNPROTECTED" != "0" ]; then
            echo "❌ FAIL: $UNPROTECTED tables have RLS disabled"
            exit 1
          fi
          echo "✅ RLS verified on all public tables"
      - name: Verify state machine integrity
        run: |
          supabase db query --linked \
            "SELECT public.validate_state_transition('draft', 'market_research') AS ok" \
            --csv | grep -q "true" && echo "✅ State machine OK" || (echo "❌ State machine broken"; exit 1)

  # ─── Edge Functions ─────────────────────────────────────────────────────────
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - name: Set production secrets
        run: |
          supabase secrets set \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            MAX_COST_PER_CALL_USD="0.50" \
            ALLOWED_ORIGIN="${{ secrets.ALLOWED_ORIGIN }}"
      - name: Deploy execute-agent-workflow
        run: supabase functions deploy execute-agent-workflow --no-verify-jwt=false
      - name: Deploy perform-approval-action
        run: supabase functions deploy perform-approval-action --no-verify-jwt=false
      - name: Deploy get-audit-trail
        run: supabase functions deploy get-audit-trail --no-verify-jwt=false
      - name: Verify no secrets in function source
        run: |
          if grep -rE "(sk-ant|sk-[a-zA-Z0-9]{32}|eyJ[a-zA-Z0-9._-]{40,})" supabase/functions/ --include="*.ts" 2>/dev/null; then
            echo "❌ FAIL: Hardcoded secrets detected in function source"
            exit 1
          fi
          echo "✅ No secrets in source"

  # ─── Next.js Build ──────────────────────────────────────────────────────────
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Verify no SERVICE_ROLE_KEY in build output
        run: |
          if grep -r "SERVICE_ROLE" .next/ 2>/dev/null | grep -v ".map" | head -5; then
            echo "❌ FAIL: Service role key detected in build output"
            exit 1
          fi
          echo "✅ No service role key in build"
